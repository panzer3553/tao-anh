name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build EXE
        run: >
          pyinstaller
          --onefile
          --windowed
          --name "NamPhuoc_TaoAnh"
          --icon NONE
          NAMPHUOC115X21_GUI.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: NamPhuoc_TaoAnh_Windows
          path: dist/NamPhuoc_TaoAnh.exe
